# Nginx HTTP-only block for qrpmobile.vk4cgo.com (used only for initial Let's Encrypt issuance).
# Certbot needs port 80 to serve the ACME challenge. Use this config until the cert exists, then
# switch to qrpmobile.vk4cgo.com.conf (which adds HTTPS and HTTP→HTTPS redirect).
#
# Install: sudo cp nginx/qrpmobile.vk4cgo.com-http-only.conf /etc/nginx/wcc/apps-available/
#         sudo ln -sf /etc/nginx/wcc/apps-available/qrpmobile.vk4cgo.com-http-only.conf /etc/nginx/wcc/apps-enabled/qrpmobile.vk4cgo.com.conf
# Then:   sudo nginx -t && sudo systemctl reload nginx
#         sudo certbot certonly --webroot -w /var/www/html/sites/qrpmobile.vk4cgo.com -d qrpmobile.vk4cgo.com
# Then replace with full config: qrpmobile.vk4cgo.com.conf (see scripts/setup-qrpmobile-vk4cgo-com.sh).

server {
    listen 80;
    listen [::]:80;
    server_name qrpmobile.vk4cgo.com;

    root /var/www/html/sites/qrpmobile.vk4cgo.com;
    # ACME challenge (certbot writes to .well-known/acme-challenge/ under root)
    location /.well-known/acme-challenge/ {
        default_type "text/plain";
    }

    location / {
        root /var/www/html/sites/qrpmobile.vk4cgo.com/dist;
        try_files $uri $uri/ /index.html;
    }
}
