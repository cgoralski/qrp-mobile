# Nginx server block: qrpmobile.vk4cgo.com (QRP Mobile)
# Serves Vite SPA from dist/ with client-side routing fallback.
#
# Deploy (after running scripts/setup-qrpmobile-vk4cgo-com.sh for first-time cert):
#   sudo cp /var/www/html/sites/qrpmobile.vk4cgo.com/nginx/qrpmobile.vk4cgo.com.conf /etc/nginx/wcc/apps-available/
#   sudo ln -sf /etc/nginx/wcc/apps-available/qrpmobile.vk4cgo.com.conf /etc/nginx/wcc/apps-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL: Let's Encrypt via certbot. See scripts/setup-qrpmobile-vk4cgo-com.sh for first-time.
# Cert path: /etc/letsencrypt/live/qrpmobile.vk4cgo.com/

# Redirect HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name qrpmobile.vk4cgo.com;
    include /etc/nginx/snippets/wcc/acme-challenge.conf;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name qrpmobile.vk4cgo.com;

    ssl_certificate     /etc/letsencrypt/live/qrpmobile.vk4cgo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qrpmobile.vk4cgo.com/privkey.pem;
    include /etc/nginx/snippets/wcc/ssl-params.conf;

    access_log /var/log/nginx/qrpmobile.vk4cgo.com.access.log;
    error_log  /var/log/nginx/qrpmobile.vk4cgo.com.error.log warn;

    root /var/www/html/sites/qrpmobile.vk4cgo.com/dist;
    index index.html;

    include /etc/nginx/snippets/wcc/cache-static.conf;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
